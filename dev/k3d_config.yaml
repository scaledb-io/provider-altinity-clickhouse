---
# See more details at https://k3d.io/v5.3.0/usage/configfile/
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  # NOTE: k3d cluster names must be <= 32 characters.
  name: provider-altinity-clickhouse
servers: 1
agents: 3
image: rancher/k3s:v1.33.2-k3s1
registries:
  create:
    name: k3d-registry
    host: "0.0.0.0"
    hostPort: "5000"
ports:
  - port: 8080:30080 # Everest UI will be accessible via http://localhost:8080 on the host machine
    nodeFilters:
      - agent:0:direct
options:
  k3d:
    wait: true
    disableLoadbalancer: true
  k3s:
    extraArgs:
      - arg: "--disable=traefik,metrics-server,servicelb"
        nodeFilters:
          - server:*
      - arg: "--disable-network-policy"
        nodeFilters:
          - server:*
