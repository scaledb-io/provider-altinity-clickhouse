---
# Triggered when a tag of the form vX.Y.Z (or vX.Y.Z-<suffix>) is pushed.
# Packages the provider Helm chart and pushes it as an OCI artifact to GHCR.
name: Push Helm OCI package

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CHART_DIR: charts/provider-altinity-clickhouse

jobs:
  push-chart:
    name: Package & push Helm OCI chart
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Extract version from tag
        id: version
        # Strip the leading "v" to get a SemVer string for Chart.yaml.
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp chart version and image
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          cd "$CHART_DIR"
          if [[ "$VERSION" == *-* ]]; then
            # Pre-release tags point at the -dev image.
            make release-dev VERSION="$VERSION"
          else
            make release VERSION="$VERSION"
          fi

      - name: Build chart dependencies
        run: helm dependency build "$CHART_DIR"

      - name: Package Helm chart
        run: |
          mkdir -p release-artifacts
          helm package "$CHART_DIR" --destination release-artifacts/

      - name: Push Helm chart to GHCR OCI registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login \
            "$REGISTRY" \
            --username "${{ github.actor }}" \
            --password-stdin
          helm push release-artifacts/provider-altinity-clickhouse-*.tgz \
            "oci://${REGISTRY}/${{ github.repository_owner }}/charts"
