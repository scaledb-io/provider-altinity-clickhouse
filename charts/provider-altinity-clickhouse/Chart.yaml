apiVersion: v2
name: provider-altinity-clickhouse
description: A Helm chart for deploying the OpenEverest provider-altinity-clickhouse provider
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - openeverest
  - provider
  - database
home: https://github.com/openeverest/provider-altinity-clickhouse
sources:
  - https://github.com/openeverest/provider-altinity-clickhouse
maintainers:
  - name: OpenEverest Contributors
# The provider owns the operator lifecycle: the Altinity ClickHouse operator
# ships as a bundled subchart so the provider installs out of the box.
dependencies:
  - name: altinity-clickhouse-operator
    alias: operator
    version: "0.27.1"
    repository: https://helm.altinity.com/
